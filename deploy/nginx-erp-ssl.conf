# ERP — HTTPS host nginx site config (TLS via Let's Encrypt).
#
# Use this INSTEAD of nginx-erp.conf once you have a domain + certificate.
# Replace every "erp.example.com" below with your real domain.
#
# Chicken-and-egg note: this file references cert files that don't exist until
# you've issued a cert, so obtain the cert FIRST (see DEPLOY.md "HTTPS"):
#   sudo certbot certonly --nginx -d erp.example.com
# …then copy this file in, `sudo nginx -t`, and reload.

# ---- HTTP :80 — serve ACME challenges, redirect everything else to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name erp.example.com;

    # Used by certbot webroot renewals (harmless if you renew via --nginx)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS :443 — the app ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.example.com;

    ssl_certificate     /etc/letsencrypt/live/erp.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.example.com/privkey.pem;

    # Modern, secure TLS defaults (Mozilla "intermediate")
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS — tells browsers to always use HTTPS. Enable only after you've
    # confirmed HTTPS works (hard to undo while max-age is live). 2 years:
    add_header Strict-Transport-Security "max-age=63072000" always;
    # A few low-risk hardening headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Built frontend (output of `npm run build -w @erp/web`)
    root /opt/erp/ERP/apps/web/dist;
    index index.html;
    client_max_body_size 10m;

    # ---- API ----  (no trailing slash => keeps the "/api" prefix)
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:4000/health;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
