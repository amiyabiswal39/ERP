# ERP — host nginx site config.
# Install to: /etc/nginx/sites-available/erp  (then symlink into sites-enabled)
# Serves the built React SPA and reverse-proxies the API + health check.

server {
    listen 80;
    # Replace with your EC2 public DNS or domain, e.g. erp.example.com
    server_name _;

    # Built frontend (output of `npm run build -w @erp/web`)
    root /opt/erp/ERP/apps/web/dist;
    index index.html;

    # Reasonable upload size for JSON / file endpoints
    client_max_body_size 10m;

    # ---- API ----
    # No trailing slash on proxy_pass => the original "/api/..." path is kept,
    # which matches how the Express app mounts its router at "/api".
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:4000/health;
    }

    # ---- SPA fallback ----
    # Let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite fingerprints filenames)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
