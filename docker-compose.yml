services:
  db:
    image: postgres:16-alpine
    container_name: erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: erp
    ports:
      - "5432:5432"
    volumes:
      - erp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: erp_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://erp:erp_password@db:5432/erp?schema=public
      JWT_ACCESS_SECRET: dev_access_secret_change_me
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me
      PORT: "4000"
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && npm run db:seed -w @erp/api && node apps/api/dist/server.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: erp_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:80"

volumes:
  erp_pgdata:
